# Docker Compose para WAHA (WhatsApp HTTP API)
# Uso: docker compose -f docker-compose.waha.yml up -d
#
# IMPORTANTE: Este arquivo usa WAHA Core (imagem gratuita).
# WAHA Core suporta apenas 1 sessão chamada "default".
# Se precisar de múltiplos números, use waha-plus ou múltiplos containers.
#
# Variáveis necessárias no .env.local:
#   WAHA_API_KEY=sua_chave_secreta
#   WAHA_WEBHOOK_SECRET=sua_chave_webhook

services:
  waha:
    image: devlikeapro/waha:latest
    container_name: clinicpro-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Chave de API para autenticar chamadas ao WAHA
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
      # Habilita dashboard web em /dashboard
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: ${WAHA_API_KEY}
    volumes:
      # Volume persistente: mantém a sessão após reiniciar o container.
      # Sem este volume, o QR Code será solicitado novamente a cada restart.
      - ./waha-sessions:/app/.sessions
      - ./waha-media:/app/.media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
