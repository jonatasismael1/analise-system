<body class="bg-background min-h-screen flex flex-col font-body-md text-body-md text-on-surface antialiased relative">
<!-- Background Medical/Geometric Overlay -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-10">
<img alt="Background" class="w-full h-full object-cover grayscale" data-alt="abstract soft geometric pattern in white and pale blue resembling clean medical surfaces or modern clinic architecture with very subtle lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrLbFnjHRN213bA0Dy0UhEdnRWlFWvacLjYj7I0e6GvbNjds7GKFDdVlfhG0Jnu2pYpczlqvfOzTy_eZIbDcf1qZsjHDncfpkeksPOun9NQaV8_e7PJE84JSnrfOVo0YYu3zAt9QFNk8T8c2EylSO_Mjn5aP1w1-Q1yKpuCk6CXYJqTa0qam6nPim1T6o8agbNMwwegGTAJYb7KPRmwrPpDJGWa_4apOPO5WGkZCrfmTeprA88ZTGboBBecRMXdyjr5ZieA-3W1Gs"/>
</div>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-lg relative z-10 w-full">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded p-xl w-full max-w-[420px] shadow-[0_4px_12px_rgba(15,118,110,0.05)] flex flex-col gap-xl">
<!-- Header & Logo -->
<div class="flex flex-col items-center gap-sm">
<img alt="Clinic Pro Logo" class="h-10 w-auto object-contain" data-alt="Clean, modern brand logo for Clinic Pro featuring sharp typography and a subtle medical cross motif in teal" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3ZW-8ssxfluMScdgvMZUFQ9mHTyewjo7eZsFepidn0sQnWSRP5aTb2TNCf9tTjxJkrXnUFVIeOGfo3c3cPaD5EdHE6C_R3CP-tIsxu7T82rRSxSiC-H2CaAZAQ44Jd5HFYfAn9Jlu-EyuPazlRkTevuhIKy-ny0orqrIGdvXA87823KecyzVVVPACIg661ZRGly4jak066j9-4siLX7GOLdOG13m6pktjCRzTxsYn3PKs9Csj3wWMwrVcIZQbWOwgC493uv3g0cs"/>
<h1 class="font-h3 text-h3 text-on-surface mt-sm">Acesso Clínico</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">Insira suas credenciais para acessar o painel de precisão médica.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-lg">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">E-mail Corporativo</label>
<input class="w-full border border-outline rounded bg-surface-container-lowest px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all" id="email" placeholder="seu@email.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Senha</label>
<a class="font-body-sm text-body-sm text-primary-container hover:text-tertiary-container hover:underline transition-colors" href="#">Esqueci minha senha</a>
</div>
<input class="w-full border border-outline rounded bg-surface-container-lowest px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action Button -->
<button class="w-full h-[40px] bg-primary-container text-on-primary font-button text-button rounded hover:brightness-90 active:scale-95 transition-all mt-sm flex items-center justify-center gap-sm" type="submit">
<span>Acessar Painel</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Secondary Action / Signup -->
<div class="pt-lg border-t border-surface-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Não tem uma conta? <br/>
<a class="text-primary-container font-medium hover:text-tertiary-container hover:underline transition-colors mt-xs inline-block" href="#">Solicite uma demonstração</a>
</p>
</div>
</div>
</main>
<!-- Shared Component: Footer -->
<footer class="w-full relative z-10 bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center px-6 py-8 gap-4">

<a class="text-slate-500 dark:text-slate-400 hover:text-teal-600 dark:hover:text-teal-300 transition-colors active:scale-98 transition-transform text-xs font-medium uppercase tracking-wider" href="#">Terms of Service</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-teal-600 dark:hover:text-teal-300 transition-colors active:scale-98 transition-transform text-xs font-medium uppercase tracking-wider" href="#">Contact Support</a>
</div>
</footer>
